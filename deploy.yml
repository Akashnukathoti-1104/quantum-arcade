name: Deploy NEXUS ARCADE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./backend
        run: npm install
      - name: Health check (start & ping)
        working-directory: ./backend
        run: |
          node server.js &
          sleep 3
          curl -f http://localhost:3001/api/health || exit 1
          kill %1
