<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS 2048</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050810;--neon:#ffd700;--neon2:#ff8c00;--neon3:#00c8ff;--panel:rgba(10,18,40,0.9);
  --border:rgba(255,215,0,0.2);--text:#fff8e0;--text-dim:#7a6a30;
  --font-display:'Orbitron',monospace;--font-mono:'Share Tech Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:var(--bg);overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;font-family:var(--font-mono)}
.bg-grid{position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,215,0,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,215,0,0.03) 1px,transparent 1px);background-size:36px 36px}

header{width:100%;padding:12px 28px;display:flex;justify-content:space-between;align-items:center;
  background:var(--panel);border-bottom:1px solid var(--border);z-index:10;position:relative}
.logo{font-family:var(--font-display);font-size:1rem;font-weight:900;letter-spacing:.2em;
  background:linear-gradient(90deg,var(--neon),var(--neon2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud{display:flex;gap:20px}
.hud-box{text-align:center}
.hud-label{font-size:.5rem;color:var(--text-dim);letter-spacing:.15em}
.hud-val{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--neon)}

.main{display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px 16px;
  position:relative;z-index:5}

.game-header{display:flex;align-items:center;justify-content:space-between;width:340px;flex-wrap:wrap;gap:8px}
.new-game-btn{font-family:var(--font-display);font-size:.6rem;letter-spacing:.12em;
  padding:8px 18px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,215,0,0.08);color:var(--neon);cursor:pointer;transition:all .2s}
.new-game-btn:hover{background:rgba(255,215,0,0.18);box-shadow:0 0 16px rgba(255,215,0,0.25)}

/* Board */
.board{
  display:grid;grid-template-columns:repeat(4,80px);grid-template-rows:repeat(4,80px);
  gap:8px;padding:12px;border-radius:10px;
  background:rgba(5,8,20,0.8);border:1px solid var(--border);
  box-shadow:0 0 40px rgba(255,215,0,0.08)}

.cell{
  width:80px;height:80px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:900;
  background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.08);
  transition:transform .1s;position:relative;overflow:hidden}
.cell.new{animation:cellPop .15s cubic-bezier(.34,1.56,.64,1)}
.cell.merge{animation:cellMerge .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes cellPop{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes cellMerge{0%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Tile colors by value */
.t-2   {background:#1a2a1a;border-color:rgba(0,255,157,.2);color:#00ff9d;font-size:1.6rem}
.t-4   {background:#1a2a30;border-color:rgba(0,200,255,.25);color:#00c8ff;font-size:1.6rem}
.t-8   {background:#1e2a10;border-color:rgba(100,255,0,.3);color:#7fff00;font-size:1.6rem}
.t-16  {background:#2a1a00;border-color:rgba(255,165,0,.3);color:#ffa500;font-size:1.5rem}
.t-32  {background:#2a0a00;border-color:rgba(255,69,0,.35);color:#ff4500;font-size:1.5rem}
.t-64  {background:#2a0010;border-color:rgba(255,45,120,.4);color:#ff2d78;font-size:1.5rem;box-shadow:0 0 16px rgba(255,45,120,.2)}
.t-128 {background:#1a1000;border-color:rgba(255,215,0,.5);color:#ffd700;font-size:1.2rem;box-shadow:0 0 20px rgba(255,215,0,.25)}
.t-256 {background:#200a00;border-color:rgba(255,140,0,.5);color:#ff8c00;font-size:1.1rem;box-shadow:0 0 20px rgba(255,140,0,.25)}
.t-512 {background:#0a0020;border-color:rgba(180,0,255,.5);color:#b400ff;font-size:1rem;box-shadow:0 0 24px rgba(180,0,255,.3)}
.t-1024{background:#000a20;border-color:rgba(0,200,255,.6);color:#00c8ff;font-size:.85rem;box-shadow:0 0 30px rgba(0,200,255,.35)}
.t-2048{background:linear-gradient(135deg,#100030,#003010);border:2px solid var(--neon);color:var(--neon);font-size:.8rem;
  box-shadow:0 0 40px rgba(255,215,0,.5);animation:winPulse 1s ease-in-out infinite alternate}
@keyframes winPulse{from{box-shadow:0 0 30px rgba(255,215,0,.4)}to{box-shadow:0 0 60px rgba(255,215,0,.8)}}

.hint-text{font-size:.65rem;color:var(--text-dim);letter-spacing:.15em}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.overlay.hidden{display:none}
.ov-title{font-family:var(--font-display);font-size:2rem;font-weight:900;letter-spacing:.2em;
  color:var(--neon);text-shadow:0 0 30px rgba(255,215,0,.5)}
.ov-score{font-family:var(--font-display);font-size:3rem;color:var(--neon)}
.ov-sub{font-size:.75rem;color:var(--text-dim);letter-spacing:.2em}
.ov-btn{font-family:var(--font-display);font-size:.65rem;letter-spacing:.15em;
  padding:12px 28px;border-radius:8px;border:1px solid var(--neon);
  background:rgba(255,215,0,.1);color:var(--neon);cursor:pointer;transition:all .2s}
.ov-btn:hover{background:rgba(255,215,0,.25);box-shadow:0 0 24px rgba(255,215,0,.3)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<header>
  <div class="logo">🔢 NEXUS 2048</div>
  <div class="hud">
    <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-val" id="score">0</div></div>
    <div class="hud-box"><div class="hud-label">BEST</div><div class="hud-val" id="best" style="color:var(--neon2)">0</div></div>
    <div class="hud-box"><div class="hud-label">MOVES</div><div class="hud-val" id="moves" style="color:var(--neon3)">0</div></div>
  </div>
</header>

<div class="main">
  <div class="game-header">
    <div style="font-family:var(--font-display);font-size:.65rem;color:var(--text-dim);letter-spacing:.1em">
      MERGE TILES → REACH <span style="color:var(--neon)">2048</span>
    </div>
    <button class="new-game-btn" onclick="newGame()">↺ NEW GAME</button>
  </div>
  <div class="board" id="board"></div>
  <div class="hint-text">↑ ↓ ← → or WASD to move tiles</div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-title" id="ov-title">NEXUS 2048</div>
  <div class="ov-sub" id="ov-sub">MERGE TILES TO REACH 2048</div>
  <div class="ov-score" id="ov-score" style="display:none"></div>
  <button class="ov-btn" id="ov-btn" onclick="startGame()">▶ START GAME</button>
</div>

<script>
let grid, score, bestScore, moveCount, gameActive, won;

function newGame() {
  grid = Array.from({length:4},()=>Array(4).fill(0));
  score = 0; moveCount = 0; gameActive = true; won = false;
  addRandom(); addRandom();
  render();
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  newGame();
}

function addRandom() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random()<.9 ? 2 : 4;
}

function slide(row) {
  const nums = row.filter(x=>x);
  const result = []; let added = false;
  for (let i=0;i<nums.length;i++) {
    if (!added && i+1<nums.length && nums[i]===nums[i+1]) {
      const merged = nums[i]*2; result.push(merged); score += merged; added=true; i++;
    } else { result.push(nums[i]); added=false; }
  }
  while (result.length<4) result.push(0);
  return result;
}

function move(dir) {
  if (!gameActive) return;
  const prev = JSON.stringify(grid);

  if (dir==='left')  for(let r=0;r<4;r++) grid[r]=slide(grid[r]);
  if (dir==='right') for(let r=0;r<4;r++) grid[r]=slide([...grid[r]].reverse()).reverse();
  if (dir==='up')    for(let c=0;c<4;c++) { const col=grid.map(r=>r[c]); const slid=slide(col); for(let r=0;r<4;r++) grid[r][c]=slid[r]; }
  if (dir==='down')  for(let c=0;c<4;c++) { const col=grid.map(r=>r[c]); const slid=slide([...col].reverse()).reverse(); for(let r=0;r<4;r++) grid[r][c]=slid[r]; }

  if (JSON.stringify(grid)!==prev) {
    moveCount++; addRandom(); render();
    if (!won && grid.flat().includes(2048)) { won=true; showEnd(true); }
    else if (!canMove()) showEnd(false);
  }
}

function canMove() {
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if(!grid[r][c]) return true;
    if(c<3&&grid[r][c]===grid[r][c+1]) return true;
    if(r<3&&grid[r][c]===grid[r+1][c]) return true;
  }
  return false;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    const v=grid[r][c];
    const cell=document.createElement('div');
    cell.className='cell'+(v?` t-${v>2048?'2048':v}`:'');
    cell.textContent=v||'';
    board.appendChild(cell);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('moves').textContent=moveCount;
  const best=Math.max(score,parseInt(localStorage.getItem('2048_best')||'0'));
  localStorage.setItem('2048_best',best);
  document.getElementById('best').textContent=best;
}

function showEnd(win) {
  gameActive=false;
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ov-title').textContent=win?'🎉 YOU WIN!':'GAME OVER';
  document.getElementById('ov-sub').textContent=win?'You reached 2048!':'No more moves!';
  const s=document.getElementById('ov-score');
  s.style.display='block'; s.textContent=score;
  document.getElementById('ov-btn').textContent='↺ PLAY AGAIN';
  try{
    const st=JSON.parse(localStorage.getItem('nexus_global_stats')||'{}');
    st.gamesPlayed=(st.gamesPlayed||0)+1;
    if(win) st.wins=(st.wins||0)+1;
    localStorage.setItem('nexus_global_stats',JSON.stringify(st));
  }catch(e){}
}

// Input
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
             KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
  if(map[e.code]){e.preventDefault();move(map[e.code]);}
});

// Touch
let ts=null;
document.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY}});
document.addEventListener('touchend',e=>{
  if(!ts)return;
  const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>30||Math.abs(dy)>30){
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  }
  ts=null;
});

document.getElementById('best').textContent=localStorage.getItem('2048_best')||0;
</script>
</body>
</html>
